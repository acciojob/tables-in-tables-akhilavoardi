<!DOCTYPE html>
<html>
<head>
    <title>Tables in Tables</title>
</head>
<body>

<table border="1" cellspacing="0" cellpadding="10" width="100%">

    <tr>
        <td>

            <!-- Nested Table 1 -->
            <table border="1" cellspacing="0" cellpadding="5" width="100%">
                <tr>
                    <th>Nested Table 1</th>
                </tr>

                <tr>
                    <td>
                        <table border="1" cellspacing="0" cellpadding="5" width="100%">
                            <tr>
                                <th>Nested Table 2</th>
                                <th>Column 1</th>
                                <th>Column 2</th>
                            </tr>

                            <tr>
                                <td rowspan="2">
                                    <ul>
                                        <li>List item 1</li>
                                        <li>List item 2</li>
                                        <li>List item 3</li>
                                    </ul>
                                </td>

                                <td>Cell 1</td>
                                <td>Cell 2</td>
                            </tr>

                            <tr>
                                <td style="background-color:black; color:white;">
                                    HTML
                                </td>

                                <td>CSS</td>
                            </tr>

                        </table>
                    </td>
                </tr>

            </table>

        </td>
    </tr>

</table>

</body>
</html>

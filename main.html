<!DOCTYPE html>
<html>
<head>
    <title>Tables in Tables</title>
</head>
<body>

<!-- Main Table -->
<table border="1" cellspacing="0" cellpadding="10" width="100%">

    <tr>
        <td>

            <!-- Nested Table 1 -->
            <table border="1" cellspacing="0" cellpadding="5" width="100%">
                <tr>
                    <th>Nested Table 1</th>
                </tr>

                <tr>
                    <td>

                        <!-- Nested Table 2 -->
                        <table border="1" cellspacing="0" cellpadding="5" width="100%">
                            <tr>
                                <th>Nested Table 2</th>
                                <th>Column 1</th>
                                <th>Column 2</th>
                            </tr>

                            <tr>
                                <td>Data 1</td>
                                <td>Data 2</td>
                                <td>Data 3</td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <tr>
                    <td>

                        <!-- Nested Table 3 -->
                        <table border="1" cellspacing="0" cellpadding="5" width="100%">
                            <tr>
                                <th>Nested Table 3</th>
                            </tr>

                            <tr>
                                <td>
                                    Nested Table
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <tr>
                    <td>

                        <!-- Nested Table 4 -->
                        <table border="1" cellspacing="0" cellpadding="5" width="100%">
                            <tr>
                                <th>Nested Table 4</th>
                            </tr>

                            <tr>
                                <td style="background-color:black; color:white;">
                                    HTML
                                </td>
                            </tr>

                            <tr>
                                <td>
                                    <ul>
                                        <li>List item 1</li>
                                        <li>List item 2</li>
                                        <li>List item 3</li>
                                    </ul>
                                </td>
                            </tr>

                        </table>

                    </td>
                </tr>

            </table>

        </td>
    </tr>

</table>

</body>
</html>
